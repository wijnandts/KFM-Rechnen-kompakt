<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaufmännisches Rechnen - Auswahl</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-dark: #1a1a1a;
            --accent-orange: #e67e22;
            --border-color: #333333;
            --hover-bg: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 50px;
        }

        /* Titelzeile */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 60px auto;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 400;
            margin: 0;
            letter-spacing: 1px;
        }

        .header-icons {
            display: flex;
            gap: 30px;
        }

        .icon-unit {
            text-align: center;
            font-size: 0.85rem;
            color: #555;
        }

        .square-icon {
            width: 45px;
            height: 45px;
            border: 1.5px solid var(--border-color);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Grid für die 5 Spalten */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .topic-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .topic-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Die Auswahlfelder (Kästchen aus der Skizze) */
        .choice-box {
            width: 100%;
            height: 100px;
            border: 2px solid var(--border-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 1.1rem;
            transition: all 0.2s ease;
            background-color: white;
        }

        .choice-box:hover {
            background-color: var(--hover-bg);
            border-color: var(--accent-orange);
            color: var(--accent-orange);
            transform: scale(1.02);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .label-text {
            font-size: 0.9rem;
            margin-bottom: 30px;
            color: #666;
            text-align: center;
        }

        /* Responsive Anpassungen */
        @media (max-width: 900px) {
            .selection-grid { grid-template-columns: repeat(2, 1fr); }
            header { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <h1>Kaufmännisches Rechnen</h1>
    <div class="header-icons">
        <div class="icon-unit">
            <div class="square-icon">✉</div>
            Kontakt
        </div>
        <div class="icon-unit">
            <div class="square-icon">▦</div>
            Rechner
        </div>
    </div>
</header>

<div class="selection-grid">
    
    <div class="topic-column">
        <div class="topic-title">Dreisatz</div>
        <a href="dreisatz_erklaerung.html" class="choice-box"></a>
        <div class="label-text">Erklärung</div>
        <a href="dreisatz_uebung.html" class="choice-box"></a>
        <div class="label-text">Übung</div>
    </div>

    <div class="topic-column">
        <div class="topic-title">Durchschnitt</div>
        <a href="durchschnitt_erklaerung.html" class="choice-box"></a>
        <div class="label-text">Erklärung</div>
        <a href="durchschnitt_uebung.html" class="choice-box"></a>
        <div class="label-text">Übung</div>
    </div>

    <div class="topic-column">
        <div class="topic-title">Prozent</div>
        <a href="prozentrechnung.html" class="choice-box"></a>
        <div class="label-text">Erklärung</div>
        <a href="prozent_uebung.html" class="choice-box"></a>
        <div class="label-text">Übung</div>
    </div>

    <div class="topic-column">
        <div class="topic-title">Zinsen</div>
        <a href="zinsen_erklaerung.html" class="choice-box"></a>
        <div class="label-text">Erklärung</div>
        <a href="zinsen_uebung.html" class="choice-box"></a>
        <div class="label-text">Übung</div>
    </div>

    <div class="topic-column">
        <div class="topic-title">Kalkulation</div>
        <a href="kalkulation_erklaerung.html" class="choice-box"></a>
        <div class="label-text">Erklärung</div>
        <a href="kalkulation_uebung.html" class="choice-box"></a>
        <div class="label-text">Übung</div>
    </div>

</div>

</body>
</html>
