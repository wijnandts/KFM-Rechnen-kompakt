<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dashboard - Kaufmännisches Rechnen</title>
    <style>
        :root {
            --bg-body: #ecf0f1;
            --text-dark: #2c3e50;
            
            /* Farben-Sets */
            --dreisatz-light: #82ccdd; --dreisatz-dark: #0a3d62;
            --durchschnitt-light: #a29bfe; --durchschnitt-dark: #4834d4;
            --prozent-light: #fab1a0; --prozent-dark: #e17055;
            --zinsen-light: #55efc4; --zinsen-dark: #00b894;
            --kalkulation-light: #ff7675; --kalkulation-dark: #d63031;
            --kasse-light: #ffeaa7; --kasse-dark: #f1c40f; /* Gold-Gelb für Kasse */
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 50px auto;
        }

        h1 { font-size: 2.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }

        .header-icons { display: flex; gap: 15px; }
        .icon-box { text-align: center; font-weight: bold; font-size: 0.7rem; }
        .sq { 
            width: 45px; height: 45px; background: white; border: 2px solid #bdc3c7; 
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; margin-bottom: 4px; box-shadow: 0 4px 0 #bdc3c7;
        }

        /* Dashboard Grid - Optimiert für 6 Themen */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .column { display: flex; flex-direction: column; gap: 20px; }
        .col-title { 
            font-size: 1.1rem; font-weight: 900; text-align: center; 
            text-transform: uppercase; padding-bottom: 10px;
        }

        /* 3D Button Styling */
        .btn-3d {
            height: 100px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transition: all 0.1s;
            position: relative;
            border: none;
            cursor: pointer;
            text-align: center;
            padding: 0 10px;
        }

        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent !important;
        }

        /* Spalten-Farben Logik */
        .col-1 .col-title { color: var(--dreisatz-dark); border-bottom: 4px solid var(--dreisatz-dark); }
        .col-1 .light { background: var(--dreisatz-light); box-shadow: 0 6px 0 #60a3bc; color: var(--dreisatz-dark); }
        .col-1 .dark { background: var(--dreisatz-dark); box-shadow: 0 6px 0 #072d48; }

        .col-2 .col-title { color: var(--durchschnitt-dark); border-bottom: 4px solid var(--durchschnitt-dark); }
        .col-2 .light { background: var(--durchschnitt-light); box-shadow: 0 6px 0 #8175e6; color: var(--durchschnitt-dark); }
        .col-2 .dark { background: var(--durchschnitt-dark); box-shadow: 0 6px 0 #341f97; }

        .col-3 .col-title { color: var(--prozent-dark); border-bottom: 4px solid var(--prozent-dark); }
        .col-3 .light { background: var(--prozent-light); box-shadow: 0 6px 0 #e8917d; color: var(--prozent-dark); }
        .col-3 .dark { background: var(--prozent-dark); box-shadow: 0 6px 0 #b33939; }

        .col-4 .col-title { color: var(--zinsen-dark); border-bottom: 4px solid var(--zinsen-dark); }
        .col-4 .light { background: var(--zinsen-light); box-shadow: 0 6px 0 #26dead; color: var(--zinsen-dark); }
        .col-4 .dark { background: var(--zinsen-dark); box-shadow: 0 6px 0 #00947a; }

        .col-5 .col-title { color: var(--kalkulation-dark); border-bottom: 4px solid var(--kalkulation-dark); }
        .col-5 .light { background: var(--kalkulation-light); box-shadow: 0 6px 0 #ff5252; color: var(--kalkulation-dark); }
        .col-5 .dark { background: var(--kalkulation-dark); box-shadow: 0 6px 0 #b33939; }

        .col-6 .col-title { color: var(--kasse-dark); border-bottom: 4px solid var(--kasse-dark); }
        .col-6 .light { background: var(--kasse-light); box-shadow: 0 6px 0 #d4ac0d; color: var(--text-dark); }
        .col-6 .dark { background: var(--kasse-dark); box-shadow: 0 6px 0 #9a7d0a; }

        @media (max-width: 600px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Kaufmännisches Rechnen</h1>
    <div class="header-icons">
        <div class="icon-box"><div class="sq">✉</div>Kontakt</div>
        <div class="icon-box"><div class="sq">▦</div>Rechner</div>
    </div>
</header>

<div class="dashboard">
    <div class="column col-1">
        <div class="col-title">Dreisatz</div>
        <a href="dreisatz_erklaerung.html" class="btn-3d light">Erklärung</a>
        <a href="dreisatz-aufgaben.html" class="btn-3d dark">Übung</a>
    </div>

    <div class="column col-2">
        <div class="col-title">Durchschnitt</div>
        <a href="durchschnitt_erklaerung.html" class="btn-3d light">Erklärung</a>
        <a href="durchschnitt_uebung.html" class="btn-3d dark">Übung</a>
    </div>

    <div class="column col-3">
        <div class="col-title">Prozent</div>
        <a href="prozentrechnung.html" class="btn-3d light">Erklärung</a>
        <a href="prozent_uebung.html" class="btn-3d dark">Übung</a>
    </div>

    <div class="column col-4">
        <div class="col-title">Zinsen</div>
        <a href="zinsen_erklaerung.html" class="btn-3d light">Erklärung</a>
        <a href="zinsen_uebung.html" class="btn-3d dark">Übung</a>
    </div>

    <div class="column col-5">
        <div class="col-title">Kalkulation</div>
        <a href="kalkulation_erklaerung.html" class="btn-3d light">Erklärung</a>
        <a href="kalkulation_uebung.html" class="btn-3d dark">Übung</a>
    </div>

    <div class="column col-6">
        <div class="col-title">Kassenabrechnung</div>
        <a href="kasse_erklaerung.html" class="btn-3d light">Erklärung</a>
        <a href="kasse_uebung.html" class="btn-3d dark">Übung</a>
    </div>
</div>

</body>
</html>
