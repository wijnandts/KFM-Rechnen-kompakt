<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulations-Master Pro [V3.7]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --primary: #3498db; 
            --success: #27ae60;
            --error: #e74c3c;
            --border-color: #dcdde1;
            --given-bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%; max-width: 1100px;
            background: var(--bg-card); padding: 40px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Taschenrechner Styling */
        #calc-widget {
            display: none; width: 100%; max-width: 300px; 
            background: #2f3640; padding: 20px; 
            border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }
        .calc-display {
            width: 100%; height: 50px; background: #f5f6fa; color: #2f3640; border: none;
            text-align: right; padding: 10px; font-family: monospace; font-size: 1.5rem; 
            margin-bottom: 15px; border-radius: 5px; box-sizing: border-box;
        }
        .calc-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { padding: 12px; background: #7f8c8d; color: white; border: none; border-radius: 5px; font-weight: 700; cursor: pointer; }
        .btn-op { background: var(--primary) !important; }
        .btn-eq { background: var(--success) !important; grid-column: span 2; }
        .btn-clr { background: var(--error) !important; grid-column: span 2; }

        .back-link { text-decoration: none; color: #7f8c8d; font-weight: bold; display: block; margin-bottom: 20px; }

        header { border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        h1 { font-size: 2rem; margin: 0; color: var(--text-main); }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; flex-wrap: wrap; gap: 10px; }
        .level-selector { display: flex; gap: 5px; background: #f1f5f9; padding: 5px; border-radius: 10px; }

        .btn {
            background: #fff; border: 1px solid var(--border-color); padding: 10px 16px;
            cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.75rem;
            border-radius: 8px; color: #64748b; transition: all 0.2s;
        }
        
        /* Aktive Zustände für Level und Modi */
        .btn.active { background: var(--primary) !important; color: #fff !important; border-color: var(--primary) !important; }
        .btn-level.active { background: #2f3640 !important; color: #fff !important; border-color: #2f3640 !important; }

        .task-info {
            background: #f9f9f9; border: 1px solid var(--border-color); padding: 20px;
            border-radius: 10px; margin-bottom: 20px; font-weight: 500; line-height: 1.6; 
            font-size: 1rem; color: var(--text-main);
        }

        .calc-grid { display: grid; grid-template-columns: 2.2fr 0.6fr 1.2fr 45px; gap: 10px; align-items: center; }
        .row-header { font-weight: 800; color: #94a3b8; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; font-size: 0.75em; text-transform: uppercase; }
        
        input, select {
            width: 100%; padding: 10px; background: #FFF; border: 1px solid var(--border-color);
            text-align: right; font-size: 1rem; box-sizing: border-box;
            border-radius: 6px;
        }
        select { text-align: left; font-size: 0.85rem; }

        .given { background: var(--given-bg); color: #7f8c8d; pointer-events: none; border-style: dashed; }
        .correct { border-color: var(--success) !important; background: #f0fdf4 !important; }
        .wrong { border-color: var(--error) !important; background: #fef2f2 !important; }

        .footer-actions { display: flex; gap: 15px; margin-top: 30px; }
        .btn-check { background: var(--primary); color: white; flex: 2; padding: 15px; border: none; font-weight: 800; border-radius: 10px; cursor: pointer; text-transform: uppercase;}
        .btn-next { background: #f1f5f9; color: #475569; flex: 1; padding: 15px; border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer; text-transform: uppercase;}
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Zurück zum Dashboard</a>
    
    <header>
        <h1>Interaktive Handelskalkulation</h1>
        <p>Lösen Sie die Aufgaben schrittweise in der gewünschten Komplexitätsstufe.</p>
    </header>

    <div class="top-bar">
        <div class="level-selector">
            <button class="btn btn-level active" id="lv1" onclick="setLevel(1)">Stufe 1</button>
            <button class="btn btn-level" id="lv2" onclick="setLevel(2)">Stufe 2</button>
            <button class="btn btn-level" id="lv3" onclick="setLevel(3)">Stufe 3</button>
        </div>
        <button class="btn" onclick="toggleCalc()">🖩 Taschenrechner</button>
    </div>

    <div id="calc-widget">
        <input type="text" class="calc-display" id="display" disabled value="0">
        <div class="calc-keys">
            <button class="calc-btn btn-clr" onclick="clearCalc()">C</button>
            <button class="calc-btn btn-op" onclick="appendToCalc('/')">/</button>
            <button class="calc-btn btn-op" onclick="appendToCalc('*')">*</button>
            <button class="calc-btn btn-clr" onclick="backspaceCalc()">←</button>
            <button class="calc-btn" onclick="appendToCalc('7')">7</button>
            <button class="calc-btn" onclick="appendToCalc('8')">8</button>
            <button class="calc-btn" onclick="appendToCalc('9')">9</button>
            <button class="calc-btn btn-op" onclick="appendToCalc('-')">-</button>
            <button class="calc-btn" onclick="appendToCalc('4')">4</button>
            <button class="calc-btn" onclick="appendToCalc('5')">5</button>
            <button class="calc-btn" onclick="appendToCalc('6')">6</button>
            <button class="calc-btn btn-op" onclick="appendToCalc('+')">+</button>
            <button class="calc-btn" onclick="appendToCalc('1')">1</button>
            <button class="calc-btn" onclick="appendToCalc('2')">2</button>
            <button class="calc-btn" onclick="appendToCalc('3')">3</button>
            <button class="calc-btn btn-eq" onclick="calculateResult()">=</button>
            <button class="calc-btn" style="grid-column: span 2" onclick="appendToCalc('0')">0</button>
            <button class="calc-btn" onclick="appendToCalc('.')">,</button>
        </div>
    </div>

    <div class="top-bar">
        <button class="btn mode-btn active" onclick="setMode('bezug')" id="m-bezug">Bezugspreis</button>
        <button class="btn mode-btn" onclick="setMode('vorwaerts')" id="m-vorwaerts">Vorwärts</button>
        <button class="btn mode-btn" onclick="setMode('rueckwaerts')" id="m-rueckwaerts">Rückwärts</button>
        <button class="btn mode-btn" onclick="setMode('differenz')" id="m-differenz">Differenz</button>
        <button class="btn mode-btn" onclick="setMode('zus-abs')" id="m-zus-abs">Zuschlag/Abschlag</button>
    </div>

    <div id="taskDescription" class="task-info">Wählen Sie einen Aufgabenbereich aus.</div>

    <div class="calc-grid" id="calcGrid"></div>
    
    <div class="footer-actions">
        <button class="btn-check" onclick="validate()">Eingabe prüfen</button>
        <button class="btn-next" onclick="loadNewTask()">Nächste Aufgabe</button>
    </div>
</div>

<script>
    let currentMode = 'bezug';
    let currentLevel = 1;
    let task = {};

    const fullSchema = [
        { id: 'lep', n: 'Listeneinkaufspreis', p: null },
        { id: 'rabVal', n: '- Liefererrabatt', p: 'rab' },
        { id: 'zep', n: '= Zieleinkaufspreis', p: null },
        { id: 'skoVal', n: '- Liefererskonto', p: 'sko' },
        { id: 'bep', n: '= Bareinkaufspreis', p: null },
        { id: 'bez', n: '+ Bezugskosten', p: null },
        { id: 'bgp', n: '= Bezugspreis', p: null },
        { id: 'hkVal', n: '+ Handlungskosten', p: 'hk' },
        { id: 'sk', n: '= Selbstkosten', p: null },
        { id: 'gewVal', n: '+ Gewinn', p: 'gew' },
        { id: 'bvp', n: '= Barverkaufspreis', p: null },
        { id: 'kskoVal', n: '+ Kundenskonto', p: 'ksko' },
        { id: 'zvp', n: '= Zielverkaufspreis', p: null },
        { id: 'krabVal', n: '+ Kundenrabatt', p: 'krab' },
        { id: 'lvp', n: '= Listenverkaufspreis (netto)', p: null }
    ];

    const zusAbsSchema = [
        { id: 'bgp', n: 'Bezugspreis', p: null },
        { id: 'zusVal', n: '+ Kalkulationszuschlag', p: 'zus' },
        { id: 'lvp', n: '= Listenverkaufspreis (netto)', p: null },
        { id: 'absVal', n: '- Kalkulationsabschlag', p: 'abs' },
        { id: 'bgp2', n: '= Bezugspreis', p: null }
    ];

    function fmt(v) { return v.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function round(v) { return Math.round((v + Number.EPSILON) * 100) / 100; }
    
    function setLevel(l) { 
        currentLevel = l; 
        document.querySelectorAll('.btn-level').forEach((b,i)=>b.classList.toggle('active', i+1===l)); 
        loadNewTask(); 
    }

    function setMode(m) { 
        currentMode = m; 
        // Korrigierte CSS-Klassen-Umschaltung
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.getElementById('m-' + m).classList.add('active');
        loadNewTask(); 
    }

    function loadNewTask() {
        const lep = round(100 + Math.random() * 800);
        const rab = [5, 10, 15, 20][Math.floor(Math.random()*4)];
        const sko = [2, 3][Math.floor(Math.random()*2)];
        const bez = round(10 + Math.random() * 30);
        const hk = [20, 25, 30][Math.floor(Math.random()*3)];
        const gew = [10, 15][Math.floor(Math.random()*2)];
        const ksko = [2, 3][Math.floor(Math.random()*2)];
        const krab = [0, 5, 10][Math.floor(Math.random()*3)];
        
        const rv = round(lep * (rab/100)), zep = round(lep - rv), sv = round(zep * (sko/100)), bep = round(zep - sv), bgp = round(bep + bez);
        const hv = round(bgp * (hk/100)), sk = round(bgp + hv), gv = round(sk * (gew/100)), bvp = round(sk + gv);
        const zvp = round(bvp / ((100-ksko)/100)), ksv = round(zvp - bvp);
        const lvp = round(zvp / ((100-krab)/100)), krv = round(lvp - zvp);
        const zus = round(((lvp - bgp) / bgp) * 100);
        const abs = round(((lvp - bgp) / lvp) * 100);

        task = { lep, rab, rabVal: rv, zep, sko, skoVal: sv, bep, bez, bgp, hk, hkVal: hv, sk, gew, gewVal: gv, bvp, ksko, kskoVal: ksv, zvp, krab, krabVal: krv, lvp, zus, zusVal: round(lvp-bgp), abs, absVal: round(lvp-bgp), bgp2: bgp };
        
        const scenarios = {
            bezug: `Ein Lieferant bietet Ware zum LEP von ${fmt(lep)} € an. Er gewährt ${rab} % Rabatt und ${sko} % Skonto. Die Bezugskosten belaufen sich auf ${fmt(bez)} €.`,
            vorwaerts: `Kalkulieren Sie den LVP: LEP ${fmt(lep)} €, ${rab}% Rabatt, ${sko}% Skonto, ${fmt(bez)}€ Bezugskosten. Zuschläge: Handlungskosten ${hk}%, Gewinn ${gew}%. Kunden-Konditionen: ${ksko}% Skonto, ${krab}% Rabatt.`,
            rueckwaerts: `Ermitteln Sie den maximalen Bezugspreis. Angestrebter Netto-LVP: ${fmt(lvp)} €. Berücksichtigen Sie ${krab}% Rabatt, ${ksko}% Skonto, ${gew}% Gewinn und ${hk}% Handlungskosten.`,
            differenz: `Wie hoch ist der Gewinn in Euro? Der Netto-LVP beträgt ${fmt(lvp)} €, der Bezugspreis liegt bei ${fmt(bgp)} €. Die Handlungskosten sind mit ${hk} % kalkuliert.`,
            'zus-abs': `Ermitteln Sie Kalkulationszuschlag (%) und Kalkulationsabschlag (%) bei einem Einstand von ${fmt(bgp)} € und einem Netto-Listenpreis von ${fmt(lvp)} €.`
        };
        document.getElementById('taskDescription').innerText = scenarios[currentMode];
        render();
    }

    function render() {
        const grid = document.getElementById('calcGrid');
        grid.innerHTML = '<div class="row-header">Posten</div><div class="row-header">%</div><div class="row-header">Betrag (€)</div><div class="row-header">Status</div>';
        
        let schema = (currentMode === 'bezug') ? fullSchema.slice(0, 7) : (currentMode === 'zus-abs' ? zusAbsSchema : fullSchema);

        schema.forEach(row => {
            if (currentLevel < 3) {
                grid.innerHTML += `<div style="font-size:0.9rem;">${row.n}</div>`;
            } else {
                let opts = schema.map(o => `<option value="${o.id}">${o.n.replace(/[=+\-]/g, '').trim()}</option>`).join('');
                grid.innerHTML += `<select id="name-${row.id}"><option value="">Wählen...</option>${opts}</select>`;
            }

            if (row.p) {
                grid.innerHTML += `<input id="p-${row.id}" class="${currentLevel==1?'given':''}" value="${currentLevel==1?task[row.p]:''}">`;
            } else grid.innerHTML += `<div></div>`;

            let isG = (row.id==='lep' && currentMode!=='rueckwaerts') || (row.id==='lvp' && (currentMode==='rueckwaerts'||currentMode==='differenz'||currentMode==='zus-abs')) || (row.id==='bgp' && (currentMode==='differenz'||currentMode==='zus-abs')) || row.id==='bez';
            grid.innerHTML += `<input id="v-${row.id}" class="${(isG && currentLevel<3)?'given':''}" value="${(isG && currentLevel<3)?fmt(task[row.id]):''}">`;
            grid.innerHTML += `<div id="s-${row.id}" style="text-align:center"></div>`;
        });
    }

    function validate() {
        let schema = (currentMode === 'bezug') ? fullSchema.slice(0, 7) : (currentMode === 'zus-abs' ? zusAbsSchema : fullSchema);
        schema.forEach(row => {
            const vEl = document.getElementById('v-' + row.id);
            const sEl = document.getElementById('s-' + row.id);
            if(!vEl) return;
            
            let val = parseFloat(vEl.value.replace('.', '').replace(',', '.'));
            let ok = Math.abs(val - task[row.id]) < 0.05;
            
            if (currentLevel > 1 && row.p) {
                let pInput = document.getElementById('p-' + row.id).value.replace(',','.');
                let pVal = parseFloat(pInput);
                if (Math.abs(pVal - task[row.p]) > 0.1) ok = false;
            }

            if (currentLevel === 3) {
                const sel = document.getElementById('name-' + row.id);
                if (sel.value !== row.id) ok = false;
            }

            vEl.className = ok ? 'correct' : 'wrong';
            sEl.innerText = ok ? '✅' : '❌';
        });
    }

    function toggleCalc() { let w = document.getElementById('calc-widget'); w.style.display = w.style.display==='block'?'none':'block'; }
    function appendToCalc(v) { let d = document.getElementById('display'); d.value = d.value === "0" ? v : d.value + v; }
    function clearCalc() { document.getElementById('display').value = "0"; }
    function calculateResult() { try { document.getElementById('display').value = eval(document.getElementById('display').value.replace(',', '.')); } catch(e) { document.getElementById('display').value = "Error"; } }
    function backspaceCalc() { let d = document.getElementById('display'); d.value = d.value.slice(0,-1) || "0"; }

    loadNewTask();
</script>
</body>
</html>
