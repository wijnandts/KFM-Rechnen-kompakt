<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW-Trainer: GuV Erfolgsermittlung XXL</title>
    <style>
        :root { --guv-green: #20c997; --nrw-blue: #005aab; --bg-light: #f8fdfc; --error: #dc3545; --success: #28a745; --border: #ced4da; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 10px; margin: 0; touch-action: manipulation; }
        .app-container { background: white; max-width: 950px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin-top: 10px; position: relative; box-sizing: border-box; }
        
        .header-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 2100; }
        .btn-round { background: var(--guv-green); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 1.3rem; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; padding-right: 150px; }
        .btn-home { text-decoration: none; color: #555; font-size: 0.9rem; font-weight: bold; background: #e0e0e0; padding: 8px 15px; border-radius: 8px; }
        
        .level-selector { display: flex; gap: 5px; }
        .level-btn { padding: 8px 12px; border: 2px solid var(--guv-green); background: white; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--guv-green); font-size: 0.8rem; }
        .level-btn.active { background: var(--guv-green); color: white; }

        #calc-container { display: none; position: fixed; top: 120px; left: 20px; width: 230px; background: #333; border-radius: 12px; padding: 12px; z-index: 3000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); cursor: move; touch-action: none; }
        #calc-display { width: 100%; height: 50px; background: #eee; border-radius: 5px; margin-bottom: 10px; text-align: right; padding: 10px; font-family: monospace; font-size: 1.4rem; border: none; box-sizing: border-box; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { padding: 15px; border: none; border-radius: 8px; background: #555; color: white; font-weight: bold; cursor: pointer; }

        h1 { color: var(--guv-green); text-align: center; font-size: 1.5rem; margin: 15px 0; text-transform: uppercase; }
        .task-box { background: #e6fcf5; border-left: 5px solid var(--guv-green); padding: 15px; margin-bottom: 15px; border-radius: 4px; font-size: 0.95rem; line-height: 1.5; }
        
        .konto-grid { overflow-x: auto; }
        .t-konto { width: 100%; min-width: 800px; border-collapse: collapse; margin-top: 15px; border-top: 4px solid #333; table-layout: fixed; }
        .t-konto th { border-bottom: 2px solid #333; padding: 10px; background: #fafafa; font-size: 0.95rem; }
        .t-konto td { border-right: 2px solid #333; padding: 12px; vertical-align: top; width: 50%; }
        
        .entry { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; }
        .gk-field { font-size: 0.85rem; flex: 1; color: #444; font-weight: bold; }
        .gk-select { flex-grow: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.85rem; background: #fff; }
        .val-in { width: 115px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; text-align: right; font-size: 0.9rem; font-weight: bold; }
        
        .erfolg-row { margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--border); color: var(--nrw-blue); font-weight: bold; }
        .sum-line { border-top: 2px solid #333; border-bottom: 4px double #333; margin-top: 15px; padding: 10px 0; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        .btn-check { background-color: var(--guv-green); color: white; }
        .btn-next { background-color: #6c757d; color: white; margin-top: 10px; opacity: 0.5; cursor: not-allowed; }
        .btn-next.enabled { background-color: var(--success); opacity: 1; cursor: pointer; }

        .feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-weight: bold; text-align: center; border: 2px solid transparent; }
    </style>
</head>
<body>

<div id="calc-container">
    <input type="text" id="calc-display" readonly value="0">
    <div class="calc-grid">
        <button class="calc-btn" style="background:var(--error); grid-column:span 2;" onclick="calcClear()">C</button>
        <button class="calc-btn" style="background:var(--guv-green);" onclick="calcOp('/')">÷</button>
        <button class="calc-btn" style="background:var(--guv-green);" onclick="calcOp('*')">×</button>
        <button class="calc-btn" onclick="calcNum('7')">7</button><button class="calc-btn" onclick="calcNum('8')">8</button><button class="calc-btn" onclick="calcNum('9')">9</button>
        <button class="calc-btn" style="background:var(--guv-green);" onclick="calcOp('-')">-</button>
        <button class="calc-btn" onclick="calcNum('4')">4</button><button class="calc-btn" onclick="calcNum('5')">5</button><button class="calc-btn" onclick="calcNum('6')">6</button>
        <button class="calc-btn" style="background:var(--guv-green);" onclick="calcOp('+')">+</button>
        <button class="calc-btn" onclick="calcNum('1')">1</button><button class="calc-btn" onclick="calcNum('2')">2</button><button class="calc-btn" onclick="calcNum('3')">3</button>
        <button class="calc-btn" onclick="calcNum('.')">.</button><button class="calc-btn" onclick="calcNum('0')">0</button>
        <button class="calc-btn" style="background:var(--success); grid-column:span 2;" onclick="calcSolve()">=</button>
    </div>
</div>

<div class="app-container">
    <div class="header-actions">
        <a href="mailto:wijnandts@bk-erkelenz.de" class="btn-round" title="E-Mail">✉</a>
        <button class="btn-round" onclick="toggleCalc()" title="Rechner">🖩</button>
        <button class="btn-round" onclick="toggleHelp(true)" title="Hilfe">?</button>
    </div>
    
    <div class="nav-header">
        <a href="index.html" class="btn-home">🏠 Übersicht</a>
        <div class="level-selector">
            <button class="level-btn active" onclick="setLevel(1, this)">Stufe 1</button>
            <button class="level-btn" onclick="setLevel(2, this)">Stufe 2</button>
            <button class="level-btn" onclick="setLevel(3, this)">Stufe 3</button>
        </div>
    </div>

    <h1>Gewinn- und Verlustkonto</h1>
    <div id="task" class="task-box">Generiere Aufgabe...</div>

    <div class="konto-grid">
        <table class="t-konto">
            <thead>
                <tr><th colspan="2">Gewinn- und Verlustkonto (GuV)</th></tr>
                <tr><th>Soll (Aufwendungen)</th><th>Haben (Erträge)</th></tr>
            </thead>
            <tbody id="konto-body"></tbody>
        </table>
    </div>

    <div id="feedbackBox" class="feedback"></div>
    <button class="btn-action btn-check" onclick="validate()">Abschluss prüfen</button>
    <button id="nextTaskBtn" class="btn-action btn-next" onclick="generateTask()">Nächste Aufgabe</button>
</div>

<script>
    let config = { level: 1, current: {} };
    const aufwandK = ["Mietaufwand", "Löhne", "Gehälter", "Büromaterial", "Werbeaufwand", "Zinsaufwand"];
    const ertragK = ["Umsatzerlöse", "Zinserträge", "Mieterträge", "Provisionserträge"];
    const alleK = ["-- wählen --", "Eigenkapital (Gewinn)", "Eigenkapital (Verlust)", ...aufwandK, ...ertragK];

    const fmt = (n) => n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function toggleHelp(s) { /* Logic handled by UI */ }
    function toggleCalc() { const c = document.getElementById("calc-container"); c.style.display = (c.style.display === "block") ? "none" : "block"; }
    
    let calcVal = "0";
    function updateCalc() { document.getElementById("calc-display").value = calcVal; }
    function calcNum(n) { calcVal = calcVal === "0" ? n : calcVal + n; updateCalc(); }
    function calcOp(op) { calcVal += " " + op + " "; updateCalc(); }
    function calcClear() { calcVal = "0"; updateCalc(); }
    function calcSolve() { try { calcVal = eval(calcVal.replace('÷', '/').replace('×', '*')).toString(); } catch { calcVal = "Error"; } updateCalc(); }

    function setLevel(lvl, btn) { config.level = lvl; document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); generateTask(); }

    function renderFields() {
        const body = document.getElementById('konto-body');
        const rows = config.level === 3 ? 6 : 3;
        let html = `<tr><td id="soll-side">`;
        for(let i=0; i<rows; i++) {
            html += `<div class="entry">`;
            if(config.level === 1) html += `<span class="gk-field" id="s-label-${i}"></span>`;
            else html += `<select class="gk-select" id="s-gk-${i}"><option value="">-- Konto --</option>${alleK.slice(1).map(k=>`<option value="${k}">${k}</option>`).join('')}</select>`;
            html += `<input type="number" step="0.01" class="val-in" id="s-val-${i}"></div>`;
        }
        html += `<div class="entry erfolg-row"><select class="gk-select" id="s-erfolg"><option value="">-- Erfolg? --</option><option>Eigenkapital (Gewinn)</option></select><input type="number" step="0.01" class="val-in" id="s-erfolg-val"></div>`;
        html += `<div class="sum-line"><span>Summe:</span><input type="number" step="0.01" class="val-in" id="sum-s"></div></td><td id="haben-side">`;
        for(let i=0; i<rows; i++) {
            html += `<div class="entry">`;
            if(config.level === 1) html += `<span class="gk-field" id="h-label-${i}"></span>`;
            else html += `<select class="gk-select" id="h-gk-${i}"><option value="">-- Konto --</option>${alleK.slice(1).map(k=>`<option value="${k}">${k}</option>`).join('')}</select>`;
            html += `<input type="number" step="0.01" class="val-in" id="h-val-${i}"></div>`;
        }
        html += `<div class="entry erfolg-row"><select class="gk-select" id="h-erfolg"><option value="">-- Erfolg? --</option><option>Eigenkapital (Verlust)</option></select><input type="number" step="0.01" class="val-in" id="h-erfolg-val"></div>`;
        html += `<div class="sum-line"><span>Summe:</span><input type="number" step="0.01" class="val-in" id="sum-h"></div></td></tr>`;
        body.innerHTML = html;
    }

    function generateTask() {
        renderFields();
        const isLoss = Math.random() > 0.5;
        const count = config.level === 3 ? 5 : 2;
        let aArr = [], eArr = [];
        for(let i=0; i<count; i++) {
            const factor = config.level === 3 ? (Math.random() + 0.5) : 1;
            aArr.push({n: aufwandK[i%6], v: Math.round((Math.floor(Math.random()*12)+5)*100 * factor * 100) / 100});
            eArr.push({n: ertragK[i%4], v: Math.round((Math.floor(Math.random()*18)+10)*100 * factor * 100) / 100});
        }
        let totalA = aArr.reduce((a, b) => a + b.v, 0);
        let totalE = eArr.reduce((a, b) => a + b.v, 0);
        if(isLoss && totalE >= totalA) totalA = totalE + 1240.50;
        if(!isLoss && totalA >= totalE) totalE = totalA + 1550.75;
        const saldo = Math.abs(totalE - totalA);
        const summe = Math.max(totalE, totalA);
        config.current = { aArr, eArr, totalA, totalE, saldo, summe, isLoss };

        document.getElementById('task').innerHTML = `<b>Posten zur Erfolgsermittlung:</b><br>` + [...aArr, ...eArr].map(x => `${x.n}: ${fmt(x.v)} €`).join(" | ");
        document.getElementById('feedbackBox').style.display = 'none';
        document.getElementById('nextTaskBtn').disabled = true; document.getElementById('nextTaskBtn').classList.remove('enabled');

        if(config.level === 1) {
            aArr.forEach((a, i) => { document.getElementById(`s-label-${i}`).innerText = a.n; document.getElementById(`s-val-${i}`).value = a.v.toFixed(2); document.getElementById(`s-val-${i}`).disabled = true; });
            eArr.forEach((e, i) => { document.getElementById(`h-label-${i}`).innerText = e.n; document.getElementById(`h-val-${i}`).value = e.v.toFixed(2); document.getElementById(`h-val-${i}`).disabled = true; });
        }
    }

    function validate() {
        const c = config.current;
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const getG = (id) => document.getElementById(id).value;
        let err = [];

        if(Math.abs(getV('sum-s') - c.summe) > 0.01 || Math.abs(getV('sum-h') - c.summe) > 0.01) err.push("Summenfehler im Abschluss.");
        
        let success = false;
        if(!c.isLoss) {
            if(getG('s-erfolg') === "Eigenkapital (Gewinn)" && Math.abs(getV('s-erfolg-val') - c.saldo) < 0.01) success = true;
        } else {
            if(getG('h-erfolg') === "Eigenkapital (Verlust)" && Math.abs(getV('h-erfolg-val') - c.saldo) < 0.01) success = true;
        }
        
        if(!success) err.push("Erfolg (Gewinn/Verlust) falsch zugeordnet oder berechnet.");

        const fb = document.getElementById('feedbackBox'); fb.style.display = 'block';
        if(err.length === 0) {
            fb.innerHTML = "✅ Hervorragend! Du hast den Abschluss korrekt durchgeführt.";
            fb.style.backgroundColor = "#d4edda"; fb.style.color = "#155724"; fb.style.borderColor = "#c3e6cb";
            document.getElementById('nextTaskBtn').disabled = false; document.getElementById('nextTaskBtn').classList.add('enabled');
        } else {
            fb.innerHTML = "❌ " + err[0]; fb.style.backgroundColor = "#f8d7da"; fb.style.color = "#721c24"; fb.style.borderColor = "#f5c6cb";
        }
    }
    window.onload = generateTask;
</script>
</body>
</html>
