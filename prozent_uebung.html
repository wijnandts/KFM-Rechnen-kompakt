<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training: Prozentrechnung</title>
    <style>
        :root {
            --main: #e17055;
            --light: #fab1a0;
            --bg: #ecf0f1;
            --border-dark: #2d3436;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            border: 2px solid var(--border-dark);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .header-row {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--border-dark);
            margin-right: auto;
        }

        .main-title {
            border: 2px solid var(--main);
            border-radius: 20px;
            padding: 6px 35px;
            font-weight: bold;
            color: var(--main);
            text-transform: uppercase;
        }

        /* Themen-Navigation basierend auf Sketch */
        .grid-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .topic-button {
            border: 2px solid var(--main);
            border-radius: 12px;
            padding: 10px 15px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: var(--main);
            font-size: 0.85rem;
            transition: all 0.2s;
            flex: 1;
            min-width: 160px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topic-button.active {
            background: var(--main);
            color: white;
        }

        /* Aufgaben-Box */
        .task-box {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 180px;
            background: #fdfdfd;
        }

        .label {
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 15px;
            color: var(--main);
        }

        /* Lösungseingabe */
        .input-area {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            background: #fff;
        }

        .input-area label {
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.1rem;
        }

        .input-area input {
            border: none;
            border-bottom: 2px solid var(--light);
            width: 100%;
            font-size: 1.2rem;
            padding: 5px;
            outline: none;
        }

        /* Footer Buttons (Rückmeldung & Nächste) */
        .footer-actions {
            display: flex;
            gap: 20px;
        }

        .btn-action {
            flex: 1;
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            background: white;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn-feedback { border-color: var(--main); color: var(--main); }
        .btn-feedback:hover { background: #fff5f2; }
        .btn-next { background: var(--bg); }
        .btn-next:hover { background: #dfe6e9; }

        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-row">
            <a href="index.html" class="back-btn">← zurück zum Dashboard</a>
            <div class="main-title">Prozentrechnung</div>
        </div>

        <div class="grid-row" id="topic-nav">
            <div class="topic-button active" onclick="setTopic('W', this)">Prozentwert berechnen</div>
            <div class="topic-button" onclick="setTopic('p', this)">Prozentsatz berechnen</div>
            <div class="topic-button" onclick="setTopic('G', this)">Grundwert berechnen</div>
            <div class="topic-button" onclick="setTopic('Gplus', this)">verm. Grundwert (Netto/Brutto)</div>
            <div class="topic-button" onclick="setTopic('Gminus', this)">verm. Grundwert (Rabatt)</div>
        </div>

        <div class="task-box">
            <span class="label">Aufgabe:</span>
            <p id="question-text" style="font-size: 1.15rem; line-height: 1.6;">Lade Aufgabe...</p>
        </div>

        <div class="input-area">
            <label>Lösung:</label>
            <input type="number" id="user-val" placeholder="Ergebnis eingeben..." step="0.01">
            <span id="unit" style="margin-left: 10px; font-weight: bold; color: var(--border-dark);"></span>
        </div>

        <div class="footer-actions">
            <div class="btn-action btn-feedback" onclick="validate()">
                <span id="res-label">Rückmeldung</span>
            </div>
            <div class="btn-action btn-next" onclick="nextTask()">
                Nächste Aufgabe
            </div>
        </div>
    </div>

    <script>
        const taskPool = {
            'W': [
                { q: "Ein Großhändler gewährt auf eine Warenlieferung im Wert von 1.250,00 € einen Treuerabatt von 12 %. Wie viel Euro beträgt der Rabatt?", a: 150.00, u: "€" },
                { q: "Von 3.500 produzierten Bauteilen weisen 4 % Mängel auf. Wie viele Bauteile sind fehlerhaft?", a: 140, u: "Stück" }
            ],
            'p': [
                { q: "Ein Artikel wurde von 180,00 € auf 153,00 € reduziert. Wie viel Prozent Preisnachlass entspricht das?", a: 15, u: "%" },
                { q: "Ein Vertreter erhält für einen Verkauf von 5.000,00 € eine Provision von 225,00 €. Berechne den Provisionssatz.", a: 4.5, u: "%" }
            ],
            'G': [
                { q: "Nach Abzug von 3 % Skonto (das entspricht 18,00 €) wird eine Rechnung beglichen. Wie hoch war der ursprüngliche Rechnungsbetrag?", a: 600.00, u: "€" },
                { q: "In einer Stadt sind 2.400 Personen arbeitslos. Das entspricht einer Quote von 8 %. Wie viele Erwerbspersonen gibt es insgesamt?", a: 30000, u: "Personen" }
            ],
            'Gplus': [
                { q: "Ein PC wird für 1.071,00 € inklusive 19 % Umsatzsteuer verkauft. Berechne den Nettopreis.", a: 900.00, u: "€" },
                { q: "Eine Aktie ist um 15 % gestiegen und steht nun bei 230,00 €. Wie hoch war der Kurs vor dem Anstieg?", a: 200.00, u: "€" }
            ],
            'Gminus': [
                { q: "Ein Wintermantel kostet im Ausverkauf nach 20 % Rabatt noch 144,00 €. Berechne den ursprünglichen Verkaufspreis.", a: 180.00, u: "€" },
                { q: "Ein Unternehmen reduziert seine Belegschaft um 10 % auf nunmehr 450 Mitarbeiter. Wie viele Mitarbeiter waren es zuvor?", a: 500, u: "Mitarbeiter" }
            ]
        };

        let currentCategory = 'W';
        let currentTask = null;

        function setTopic(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.topic-button').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            nextTask();
        }

        function nextTask() {
            const tasks = taskPool[currentCategory];
            currentTask = tasks[Math.floor(Math.random() * tasks.length)];
            document.getElementById('question-text').innerText = currentTask.q;
            document.getElementById('unit').innerText = currentTask.u;
            document.getElementById('res-label').innerText = "Rückmeldung";
            document.getElementById('res-label').className = "";
            document.getElementById('user-val').value = "";
            document.getElementById('user-val').focus();
        }

        function validate() {
            if (!currentTask) return;
            const val = parseFloat(document.getElementById('user-val').value);
            const label = document.getElementById('res-label');
            
            if (isNaN(val)) return;

            if (Math.abs(val - currentTask.a) < 0.01) {
                label.innerText = "Korrekt! ✓";
                label.className = "correct";
            } else {
                label.innerText = "Falsch! Lösung: " + currentTask.a.toLocaleString('de-DE', {minimumFractionDigits: 2});
                label.className = "wrong";
            }
        }

        // Initialisierung
        nextTask();
    </script>
</body>
</html>
