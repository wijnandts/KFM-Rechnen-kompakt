<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übung: Prozentrechnung</title>
    <style>
        :root {
            --main: #e17055;
            --light: #fab1a0;
            --bg: #ecf0f1;
            --border-dark: #2d3436;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Hauptcontainer basierend auf Sketch */
        .card {
            background: white;
            border: 2px solid var(--border-dark);
            width: 100%;
            max-width: 850px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Header */
        .header-row {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--border-dark);
            margin-right: auto;
        }

        .main-title {
            border: 2px solid var(--main);
            border-radius: 20px;
            padding: 6px 35px;
            font-weight: bold;
            color: var(--main);
            text-transform: uppercase;
        }

        /* Themen & Stufen */
        .grid-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .topic-button {
            border: 2px solid var(--main);
            border-radius: 12px;
            padding: 10px 22px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: var(--main);
            transition: all 0.2s;
        }

        .topic-button.active {
            background: var(--main);
            color: white;
        }

        .level-button {
            border: 2px solid var(--border-dark);
            border-radius: 10px;
            padding: 8px 25px;
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        .level-button.active {
            background: var(--border-dark);
            color: white;
        }

        /* Aufgaben-Bereich */
        .task-box {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 200px;
            background: #fdfdfd;
        }

        .label {
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 15px;
            color: var(--main);
        }

        /* Lösungs-Eingabe */
        .input-area {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            background: #fff;
        }

        .input-area label {
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.1rem;
        }

        .input-area input {
            border: none;
            border-bottom: 2px solid var(--light);
            width: 100%;
            font-size: 1.2rem;
            padding: 5px;
            outline: none;
        }

        /* Untere Buttons */
        .footer-actions {
            display: flex;
            gap: 20px;
        }

        .btn-action {
            flex: 1;
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            background: white;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .btn-action:active { transform: scale(0.98); }

        .btn-feedback { border-color: var(--main); color: var(--main); }
        .btn-next { background: var(--bg); }

        .feedback-msg { font-size: 1.1rem; }
        .correct { color: green; font-weight: bold; }
        .wrong { color: #e17055; font-weight: bold; }

    </style>
</head>
<body>

    <div class="card">
        <div class="header-row">
            <a href="#" class="back-btn">← zurück zum Dashboard</a>
            <div class="main-title">Hauptthema</div>
        </div>

        <div class="grid-row">
            <div class="topic-button active">Thema 1</div>
            <div class="topic-button">Thema 2</div>
            <div class="topic-button">Thema 3</div>
            <div class="topic-button">Thema 4</div>
        </div>

        <div class="grid-row" style="margin-bottom: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
            <div class="level-button active">Stufe 1</div>
            <div class="level-button">Stufe 2</div>
            <div class="level-button">Stufe 3</div>
        </div>

        <div class="task-box">
            <span class="label">Aufgabe:</span>
            <p id="question-text" style="font-size: 1.2rem; line-height: 1.5;">Lade Aufgabe...</p>
        </div>

        <div class="input-area">
            <label>Lösung:</label>
            <input type="number" id="user-val" placeholder="Dein Ergebnis..." step="0.01">
            <span style="margin-left: 10px; font-weight: bold;">€/%</span>
        </div>

        <div class="footer-actions">
            <div class="btn-action btn-feedback" onclick="validate()">
                <span id="res-label">Rückmeldung</span>
            </div>
            <div class="btn-action btn-next" onclick="next()">
                Nächste Aufgabe
            </div>
        </div>
    </div>

    <script>
        const pool = [
            { q: "Ein Sakko kostet 99,00€ brutto. Wie viel Euro beträgt der Rabatt bei 10% Nachlass?", a: 9.90 },
            { q: "Bareinnahmen brutto: 2.259,70€. Steuersatz 19%. Berechne den Nettowert.", a: 1898.91 },
            { q: "Ein Anorak kostet nach 5% Rabatt noch 118,75€. Wie hoch war der ursprüngliche Preis?", a: 125.00 },
            { q: "Bluse: Ursprünglich 21,00€, jetzt 16,80€. Wie viel Prozent Rabatt wurden gewährt?", a: 20 },
            { q: "Bruttopreis 34,98€, USt 19%. Wie hoch ist der Netto-Verkaufspreis?", a: 29.39 },
            { q: "Ein Händler erhöht den Preis von 845,12€ auf 914,84€. Wie viel % Steigerung?", a: 8.25 }
        ];

        let activeTask = null;

        function next() {
            activeTask = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('question-text').innerText = activeTask.q;
            document.getElementById('res-label').innerHTML = "Rückmeldung";
            document.getElementById('res-label').className = "feedback-msg";
            document.getElementById('user-val').value = "";
            document.getElementById('user-val').focus();
        }

        function validate() {
            if (!activeTask) return;
            const input = parseFloat(document.getElementById('user-val').value);
            const label = document.getElementById('res-label');
            
            if (Math.abs(input - activeTask.a) < 0.05) {
                label.innerHTML = "Korrekt! ✓";
                label.className = "feedback-msg correct";
            } else {
                label.innerHTML = "Falsch (Lösung: " + activeTask.a.toFixed(2) + ")";
                label.className = "feedback-msg wrong";
            }
        }

        // Init
        next();
    </script>
</body>
</html>
