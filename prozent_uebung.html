<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prozent-Master Pro</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --white: #ffffff;
            --primary: #4834d4;
            --primary-hover: #3c2bb3;
            --secondary: #95a5a6;
            --accent: #e17055;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --calc-bg: #2d3436;
            --calc-btn: #4b5563;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            align-items: flex-start;
        }

        /* Übungskarte */
        .exercise-card {
            background: var(--white);
            flex: 1;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .dashboard-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 { font-size: 1.8rem; margin: 0 0 5px 0; color: var(--text-main); }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 1rem; }

        /* Themen-Pills */
        .topic-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .topic-pill {
            padding: 8px 16px;
            border-radius: 50px;
            background: #f1f2f6;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .topic-pill:hover { background: #dfe4ea; }
        .topic-pill.active {
            background: var(--white);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Aufgaben-Bereich */
        .task-container {
            background: #f8f9fa;
            border-left: 5px solid var(--primary);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .task-text { font-size: 1.15rem; line-height: 1.6; margin: 0; }

        .info-box {
            background: #fff9f1;
            border-radius: 8px;
            padding: 12px 20px;
            color: #d35400;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Input */
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #edeff2;
            border-radius: 12px;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: #f1f2f6; color: var(--text-main); }
        .btn-secondary:hover { background: #dfe4ea; }

        /* Taschenrechner */
        .calc-wrapper {
            width: 320px;
            background: var(--calc-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .calc-header { color: #9ca3af; font-size: 0.75rem; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 15px; }
        #calc-screen {
            width: 100%;
            background: #1f2937;
            border: none;
            border-radius: 10px;
            padding: 20px;
            color: #10b981;
            font-size: 1.8rem;
            text-align: right;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: monospace;
        }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn {
            background: var(--calc-btn);
            border: none;
            border-radius: 10px;
            padding: 18px 0;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .calc-btn.op { background: var(--primary); }
        .calc-btn.clear { background: var(--accent); }
        .calc-btn.eq { background: #10b981; grid-column: span 2; }

        /* Feedback Colors */
        .correct { background: #10b981 !important; color: white !important; }
        .wrong { background: #ef4444 !important; color: white !important; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .exercise-card { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="exercise-card">
        <a href="index.html" class="dashboard-back">← Dashboard</a>
        <h1>Prozent-Master Pro</h1>
        <p class="subtitle">Übungsmodul für kaufmännische Prozentrechnung</p>

        <div class="topic-nav">
            <div class="topic-pill active" onclick="setCat('W', this)">Prozentwert</div>
            <div class="topic-pill" onclick="setCat('p', this)">Prozentsatz</div>
            <div class="topic-pill" onclick="setCat('G', this)">Grundwert</div>
            <div class="topic-pill" onclick="setCat('Gplus', this)">Vermehrter GW</div>
            <div class="topic-pill" onclick="setCat('Gminus', this)">Verminderter GW</div>
        </div>

        <div class="task-container">
            <p id="task-text" class="task-text">Lade Aufgabe...</p>
        </div>

        <div class="info-box">
            ⚠️ Info: Bitte das Ergebnis kaufmännisch auf 2 Stellen runden!
        </div>

        <div class="input-group">
            <input type="number" id="user-input" placeholder="Dein Ergebnis eingeben" step="0.01">
        </div>

        <button id="check-btn" class="btn btn-primary" onclick="check()">Antwort prüfen</button>
        <button class="btn btn-secondary" onclick="next()">Nächste Aufgabe</button>
    </div>

    <div class="calc-wrapper">
        <div class="calc-header">RECHNER</div>
        <input type="text" id="calc-screen" readonly value="0">
        <div class="calc-grid">
            <button class="calc-btn clear" onclick="cClear()">C</button>
            <button class="calc-btn op" onclick="cInput('/')">÷</button>
            <button class="calc-btn op" onclick="cInput('*')">×</button>
            <button class="calc-btn op" onclick="cInput('-')">-</button>
            
            <button class="calc-btn" onclick="cInput('7')">7</button>
            <button class="calc-btn" onclick="cInput('8')">8</button>
            <button class="calc-btn" onclick="cInput('9')">9</button>
            <button class="calc-btn op" onclick="cInput('+')">+</button>

            <button class="calc-btn" onclick="cInput('4')">4</button>
            <button class="calc-btn" onclick="cInput('5')">5</button>
            <button class="calc-btn" onclick="cInput('6')">6</button>
            <button class="calc-btn" onclick="cInput('.')">,</button>

            <button class="calc-btn" onclick="cInput('1')">1</button>
            <button class="calc-btn" onclick="cInput('2')">2</button>
            <button class="calc-btn" onclick="cInput('3')">3</button>
            <button class="calc-btn" onclick="cInput('0')">0</button>

            <button class="calc-btn eq" onclick="cEval()">=</button>
        </div>
    </div>
</div>

<script>
    const pool = {
        'W': [
            { q: "Ein Händler gewährt auf 1.450 € Warenwert 12 % Rabatt. Wie hoch ist der Rabattbetrag?", a: 174 },
            { q: "Berechne 19 % Umsatzsteuer für einen Nettobetrag von 840,00 €.", a: 159.6 },
            { q: "Ein Unternehmen investiert 25.000 €. 8 % davon entfallen auf Software. Wie viel Euro sind das?", a: 2000 }
        ],
        'p': [
            { q: "Ein Vertreter erhält 315 € Provision bei 4.500 € Umsatz. Wie hoch ist der Prozentsatz?", a: 7 },
            { q: "Ein Artikel wurde von 120 € auf 102 € reduziert. Wie viel % Rabatt entspricht das?", a: 15 },
            { q: "Von 800 Bauteilen sind 16 fehlerhaft. Wie hoch ist die Ausschussquote in %?", a: 2 }
        ],
        'G': [
            { q: "Ein Mieter zahlt 210 € Nebenkosten, was 14 % der Warmmiete entspricht. Wie hoch ist die Warmmiete?", a: 1500 },
            { q: "3 % Skonto entsprechen einem Betrag von 45 €. Berechne den Rechnungsbetrag.", a: 1500 },
            { q: "Ein Vertreter erhält bei 5 % Provisionssatz 1.200 €. Welcher Umsatz wurde erzielt?", a: 24000 }
        ],
        'Gplus': [
            { q: "Ein Brutto-Preis von 535,50 € enthält 19 % USt. Berechne den Nettopreis.", a: 450 },
            { q: "Nach einer Preiserhöhung um 8 % kostet ein Rohstoff 324 €/t. Wie hoch war der alte Preis?", a: 300 },
            { q: "Eine Aktie steht nach 15 % Gewinn bei 230 €. Was war der Einstiegskurs?", a: 200 }
        ],
        'Gminus': [
            { q: "Ein Mantel kostet nach 20 % Rabatt noch 144 €. Wie hoch war der ursprüngliche Preis?", a: 180 },
            { q: "Nach Abzug von 2 % Skonto zahlt ein Kunde 1.470 €. Wie hoch war die Rechnung?", a: 1500 },
            { q: "Ein Lagerbestand sank um 15 % auf 680 Einheiten. Wie hoch war der Anfangsbestand?", a: 800 }
        ]
    };

    let cat = 'W';
    let task = null;

    function setCat(c, el) {
        cat = c;
        document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        next();
    }

    function next() {
        const tasks = pool[cat];
        task = tasks[Math.floor(Math.random() * tasks.length)];
        document.getElementById('task-text').innerText = task.q;
        document.getElementById('user-input').value = "";
        document.getElementById('check-btn').innerText = "Antwort prüfen";
        document.getElementById('check-btn').className = "btn btn-primary";
        document.getElementById('user-input').focus();
    }

    function check() {
        const val = parseFloat(document.getElementById('user-input').value);
        const btn = document.getElementById('check-btn');
        if (isNaN(val)) return;

        if (Math.abs(val - task.a) < 0.01) {
            btn.innerText = "Korrekt!";
            btn.className = "btn btn-primary correct";
        } else {
            btn.innerText = "Falsch! Lösung: " + task.a.toFixed(2);
            btn.className = "btn btn-primary wrong";
        }
    }

    // Rechner Funktionen
    const screen = document.getElementById('calc-screen');
    function cInput(v) { if(screen.value === "0") screen.value = ""; screen.value += v; }
    function cClear() { screen.value = "0"; }
    function cEval() { 
        try { screen.value = eval(screen.value); } 
        catch { screen.value = "Error"; } 
    }

    next();
</script>

</body>
</html>
