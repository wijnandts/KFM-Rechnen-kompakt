<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreisatz-Master Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --primary: #3498db;
            --secondary: #27ae60;
            --accent: #f59e0b;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border-color: #dcdde1;
            --error: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }

        /* Dashboard Button Styling */
        .back-link { 
            text-decoration: none; 
            color: var(--text-light); 
            font-weight: bold; 
            display: block; 
            margin-bottom: 20px; 
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap;
        }

        .card {
            flex: 2;
            min-width: 320px;
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Taschenrechner Styling (Einheitlich) */
        .calculator {
            flex: 0.8;
            min-width: 300px;
            background: #2f3640;
            padding: 20px;
            border-radius: 15px;
            color: white;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        header { 
            border-bottom: 3px solid var(--primary); 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
        }

        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; }

        .nav { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        .nav button {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: #f9fafb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
            color: var(--text-light);
            text-align: left;
        }
        
        .nav button.active { 
            border-color: var(--primary); 
            color: white; 
            background: var(--primary); 
        }

        .display {
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            line-height: 1.6;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
            min-height: 120px;
        }

        .hint { 
            font-size: 0.85rem; 
            color: var(--accent); 
            font-weight: bold; 
            margin-bottom: 12px; 
            text-align: center; 
        }

        .input-area { display: flex; flex-direction: column; gap: 12px; }
        
        input {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-size: 1.3rem;
            text-align: center;
            outline: none;
        }

        .btn-check {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-next {
            background: #f1f5f9;
            color: #475569;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #res { display: none; padding: 16px; border-radius: 10px; text-align: center; font-weight: bold; margin-top: 16px; }

        /* Calculator UI */
        .calc-display {
            width: 100%;
            height: 50px;
            background: #f5f6fa;
            border: none;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            font-size: 1.5rem;
            border-radius: 5px;
            color: #2f3640;
            font-family: monospace;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-btn {
            padding: 15px 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background: #7f8c8d;
            color: white;
            font-size: 1.1rem;
        }

        .calc-btn.op { background: var(--primary); }
        .calc-btn.eq { background: var(--secondary); grid-column: span 2; }
        .calc-btn.clr { background: var(--error); grid-column: span 2; }

        footer { 
            text-align: center; 
            margin-top: 40px; 
            color: var(--text-light);
            font-size: 0.9rem;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Zurück zum Dashboard</a>

    <div class="main-wrapper">
        <div class="card">
            <header>
                <h1>Dreisatz-Master Pro</h1>
                <p style="color: var(--text-light); margin-top: 5px;">Übungsmodul für proportionale und antiproportionale Kalkulationen</p>
            </header>
            
            <div class="nav">
                <button onclick="changeMode('prop', this)" class="active">Proportionale Zuordnung (gerader Dreisatz)</button>
                <button onclick="changeMode('anti', this)">Antiproportionale Zuordnung (ungerader Dreisatz)</button>
                <button onclick="changeMode('mix', this)">Zusammengesetzter Dreisatz</button>
            </div>

            <div id="quest" class="display">Aufgabe wird geladen...</div>

            <div class="hint">⚠️ Bitte runden Sie Ihr Ergebnis auf 2 Dezimalstellen!</div>

            <div class="input-area">
                <input type="number" id="val" placeholder="Ihr Ergebnis" step="0.01">
                <button class="btn-check" onclick="verify()">Eingabe prüfen</button>
                <button class="btn-next" onclick="next()">Nächste Aufgabe</button>
            </div>

            <div id="res"></div>
        </div>

        <div class="calculator">
            <h3 style="margin-top: 0; font-size: 1.1rem; text-transform: uppercase;">Rechner</h3>
            <input type="text" id="calc-screen" class="calc-display" disabled value="0">
            <div class="calc-grid">
                <button class="calc-btn clr" onclick="calcClear()">C</button>
                <button class="calc-btn op" onclick="calcIn('/')">÷</button>
                <button class="calc-btn op" onclick="calcIn('*')">×</button>
                
                <button class="calc-btn" onclick="calcIn('7')">7</button>
                <button class="calc-btn" onclick="calcIn('8')">8</button>
                <button class="calc-btn" onclick="calcIn('9')">9</button>
                <button class="calc-btn op" onclick="calcIn('-')">-</button>
                
                <button class="calc-btn" onclick="calcIn('4')">4</button>
                <button class="calc-btn" onclick="calcIn('5')">5</button>
                <button class="calc-btn" onclick="calcIn('6')">6</button>
                <button class="calc-btn op" onclick="calcIn('+')">+</button>
                
                <button class="calc-btn" onclick="calcIn('1')">1</button>
                <button class="calc-btn" onclick="calcIn('2')">2</button>
                <button class="calc-btn" onclick="calcIn('3')">3</button>
                <button class="calc-btn" onclick="calcIn('.')">,</button>
                
                <button class="calc-btn" onclick="calcIn('0')">0</button>
                <button class="calc-btn eq" onclick="calcEval()">=</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Haben Sie Fragen oder Anregungen? Kontaktieren Sie uns gerne.<br>
        <a href="mailto:wijnandts@bk-erkelenz.de" style="color: var(--primary); font-weight: bold; text-decoration: none;">Kontakt aufnehmen</a></p>
    </footer>
</div>

<script>
    let currentMode = 'prop';
    let targetValue = 0;
    let calcExpr = "";

    const scenarios = {
        prop: [
            { s: "Ein Betrieb benötigt für die Herstellung von {a} Ballen Stoff {c} kg Rohmaterial. Wie viele kg werden für {d} Ballen benötigt?", f: (a,b,c,d,e) => (c / a) * d },
            { s: "Ein Ballen Anzugstoff von {a} m Länge kostet {b} €. Wie viel Euro müssen Sie für {c} m dieses Stoffes bezahlen?", f: (a,b,c) => (b/a)*c },
            { s: "{a} Meter Stoff mit einer Breite von {b} cm kosten {c} €. Wie viel kosten {d} Meter bei derselben Breite?", f: (a,b,c,d,e) => (c / a) * d }
        ],
        anti: [
            { s: "Ein Betrieb beschäftigt bei einer {a}-stündigen Arbeitswoche {b} Mitarbeiter. Wie viele Mitarbeiter müssten es bei einer {c}-stündigen Woche sein, um die gleiche Leistung zu erbringen?", f: (a,b,c) => (a*b)/c },
            { s: "Ein Futtervorrat reicht für {a} Tiere genau {b} Tage. Wie viele Tage reicht der Vorrat, wenn der Bestand auf {c} Tiere erhöht wird?", f: (a,b,c) => (a*b)/c }
        ],
        mix: [
            { s: "{a} Arbeiter errichten in {b} Tagen eine Mauer von {c} m Länge. Wie viele Tage benötigen {d} Arbeiter für eine Mauer von {e} m Länge?", f: (a,b,c,d,e) => (b / (c / a)) * (e / d) },
            { s: "{a} Lkw transportieren in {b} Tagen {c} t Kies. Wie viele Tonnen schaffen {d} Lkw in {e} Tagen?", f: (a,b,c,d,e) => (c / (a * b)) * (d * e) }
        ]
    };

    function changeMode(m, btn) {
        currentMode = m;
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        next();
    }

    function next() {
        document.getElementById('res').style.display = 'none';
        document.getElementById('val').value = '';
        const list = scenarios[currentMode];
        const sc = list[Math.floor(Math.random() * list.length)];
        
        let a = rand(10, 50), b = rand(2, 20), c = rand(100, 500), d = rand(5, 40), e = rand(5, 25);
        
        document.getElementById('quest').innerText = sc.s.replace('{a}', a).replace('{b}', b).replace('{c}', c).replace('{d}', d).replace('{e}', e);
        targetValue = sc.f(a,b,c,d,e);
    }

    function verify() {
        const user = parseFloat(document.getElementById('val').value.replace(',', '.'));
        const r = document.getElementById('res');
        r.style.display = 'block';
        const rounded = Math.round(targetValue * 100) / 100;
        
        if(!isNaN(user) && Math.abs(user - rounded) < 0.015) {
            r.style.background = "#d1fae5"; r.style.color = "#065f46"; 
            r.innerHTML = "<b>Richtig!</b><br>Die Lösung lautet " + rounded.toLocaleString('de-DE', {minimumFractionDigits: 2}) + ".";
        } else {
            r.style.background = "#fee2e2"; r.style.color = "#991b1b"; 
            r.innerHTML = "<b>Leider nicht korrekt.</b><br>Die richtige Lösung lautet " + rounded.toLocaleString('de-DE', {minimumFractionDigits: 2}) + ".";
        }
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }

    // Calc functions
    function calcIn(v) { calcExpr += v; document.getElementById('calc-screen').value = calcExpr; }
    function calcClear() { calcExpr = ""; document.getElementById('calc-screen').value = "0"; }
    function calcEval() {
        try { 
            let res = eval(calcExpr); 
            calcExpr = Number.isInteger(res) ? res.toString() : res.toFixed(3);
            document.getElementById('calc-screen').value = calcExpr.replace('.', ',');
        } catch { document.getElementById('calc-screen').value = "Fehler"; calcExpr = ""; }
    }

    window.onload = next;
</script>
</body>
</html>
