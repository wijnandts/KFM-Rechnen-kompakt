<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulations-Master Pro [V3.4]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --primary: #4f46e5; 
            --primary-light: #eef2ff;
            --success: #10b981;
            --error: #ef4444;
            --border-color: #e2e8f0;
            --given-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 10px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%; max-width: 900px;
            background: var(--bg-card); padding: 20px;
            border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            box-sizing: border-box; position: relative;
        }

        #calc-widget {
            display: none; width: 100%; max-width: 320px; 
            background: #1e293b; border: 2px solid #334155; padding: 15px; 
            border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }
        .calc-display {
            width: 100%; height: 45px; background: #0f172a; color: #38bdf8; border: none;
            text-align: right; padding: 10px; font-family: monospace; font-size: 1.2em; 
            margin-bottom: 10px; border-radius: 6px;
        }
        .calc-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .calc-keys .btn-calc { padding: 10px; background: #334155; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; flex-wrap: wrap; gap: 10px; }
        .level-selector { display: flex; gap: 5px; background: #f1f5f9; padding: 5px; border-radius: 12px; }

        .btn {
            background: #fff; border: 1px solid var(--border-color); padding: 10px 14px;
            cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.7em;
            border-radius: 8px; color: #64748b; transition: all 0.2s;
        }
        .btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-level.active { background: #334155; color: #fff; border-color: #334155; }

        .task-info {
            background: #fffde7; border-left: 5px solid #facc15; padding: 18px;
            border-radius: 8px; margin-bottom: 20px; font-weight: 500; line-height: 1.6; 
            font-size: 0.95em; color: #854d0e;
        }

        .calc-grid { display: grid; grid-template-columns: 2fr 0.6fr 1.2fr 45px; gap: 8px; align-items: center; }
        .row-header { font-weight: 800; color: #94a3b8; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; font-size: 0.65em; }
        
        input, select {
            width: 100%; padding: 10px 5px; background: #FFF; border: 1.5px solid var(--border-color);
            text-align: right; font-size: 0.95em; font-weight: 700; box-sizing: border-box;
            border-radius: 8px; height: 42px;
        }
        select { text-align: left; font-size: 0.8em; font-weight: 400; }

        .given { background: var(--given-bg); color: #475569; border: 1.5px dashed #cbd5e1; pointer-events: none; }
        .correct { border-color: var(--success) !important; background: #ecfdf5 !important; }
        .wrong { border-color: var(--error) !important; background: #fef2f2 !important; }

        .status-cell { font-size: 1.1em; text-align: center; }

        .footer-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-check { background: var(--success); color: white; flex: 2; padding: 15px; border: none; font-weight: 800; border-radius: 10px; cursor: pointer;}
        .btn-next { background: #f1f5f9; color: #475569; flex: 1; padding: 15px; border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer;}

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(3px); }
        .modal-content { background: #fff; margin: 10% auto; padding: 25px; border-radius: 20px; width: 85%; max-width: 450px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="level-selector">
            <button class="btn btn-level active" id="lv1" onclick="setLevel(1)">Stufe 1</button>
            <button class="btn btn-level" id="lv2" onclick="setLevel(2)">Stufe 2</button>
            <button class="btn btn-level" id="lv3" onclick="setLevel(3)">Stufe 3</button>
        </div>
        <button class="btn" onclick="toggleCalc()">🖩 Rechner</button>
    </div>

    <div id="calc-widget">
        <input type="text" class="calc-display" id="display" disabled value="0">
        <div class="calc-keys">
            <button class="btn-calc" onclick="clearCalc()">C</button>
            <button class="btn-calc" onclick="appendToCalc('/')">/</button>
            <button class="btn-calc" onclick="appendToCalc('*')">*</button>
            <button class="btn-calc" onclick="backspaceCalc()">←</button>
            <button class="btn-calc" onclick="appendToCalc('7')">7</button>
            <button class="btn-calc" onclick="appendToCalc('8')">8</button>
            <button class="btn-calc" onclick="appendToCalc('9')">9</button>
            <button class="btn-calc" onclick="appendToCalc('-')">-</button>
            <button class="btn-calc" onclick="appendToCalc('4')">4</button>
            <button class="btn-calc" onclick="appendToCalc('5')">5</button>
            <button class="btn-calc" onclick="appendToCalc('6')">6</button>
            <button class="btn-calc" onclick="appendToCalc('+')">+</button>
            <button class="btn-calc" onclick="appendToCalc('1')">1</button>
            <button class="btn-calc" onclick="appendToCalc('2')">2</button>
            <button class="btn-calc" onclick="appendToCalc('3')">3</button>
            <button class="btn-calc" onclick="calculateResult()">=</button>
            <button class="btn-calc" style="grid-column: span 2" onclick="appendToCalc('0')">0</button>
            <button class="btn-calc" onclick="appendToCalc('.')">,</button>
        </div>
    </div>

    <div class="top-bar">
        <button class="btn" onclick="toggleModal('instrModal')">📖 Anleitung</button>
        <button class="btn" onclick="toggleModal('contactModal')">✉️ Kontakt</button>
    </div>

    <div class="tabs" style="display:flex; gap:5px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;">
        <button class="btn active" onclick="setMode('bezug')" id="m-bezug">Bezugspreis</button>
        <button class="btn" onclick="setMode('vorwaerts')" id="m-vorwaerts">Vorwärts</button>
        <button class="btn" onclick="setMode('rueckwaerts')" id="m-rueckwaerts">Rückwärts</button>
        <button class="btn" onclick="setMode('differenz')" id="m-differenz">Differenz</button>
        <button class="btn" onclick="setMode('zus-abs')" id="m-zus-abs">Zuschlag/Abschlag</button>
    </div>

    <div id="taskDescription" class="task-info">Wähle ein Modul.</div>

    <div class="calc-grid" id="calcGrid"></div>
    
    <div class="footer-actions">
        <button class="btn-check" onclick="validate()">PRÜFEN</button>
        <button class="btn-next" onclick="loadNewTask()">NÄCHSTE AUFGABE</button>
    </div>
</div>

<div id="instrModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--primary); margin-top:0">Anleitung</h2>
        <p><b>Stufe 1:</b> Alles vorgegeben. Nur Beträge rechnen.</p>
        <p><b>Stufe 2:</b> Prozentsätze aus dem Fließtext entnehmen.</p>
        <p><b>Stufe 3:</b> Begriffe im Dropdown wählen. Neue Aufgabe bei jedem Stufenwechsel (variierende Beträge & Prozente).</p>
        <button class="btn active" style="width:100%; padding:15px" onclick="toggleModal('instrModal')">VERSTANDEN</button>
    </div>
</div>

<script>
    let currentMode = 'bezug';
    let currentLevel = 1;
    let task = {};

    const fullSchema = [
        { id: 'lep', n: 'Listeneinkaufspreis', p: null },
        { id: 'rabVal', n: '- Liefererrabatt', p: 'rab' },
        { id: 'zep', n: '= Zieleinkaufspreis', p: null },
        { id: 'skoVal', n: '- Liefererskonto', p: 'sko' },
        { id: 'bep', n: '= Bareinkaufspreis', p: null },
        { id: 'bez', n: '+ Bezugskosten', p: null },
        { id: 'bgp', n: '= Bezugspreis', p: null },
        { id: 'hkVal', n: '+ Handlungskosten', p: 'hk' },
        { id: 'sk', n: '= Selbstkosten', p: null },
        { id: 'gewVal', n: '+ Gewinn', p: 'gew' },
        { id: 'bvp', n: '= Barverkaufspreis', p: null },
        { id: 'kskoVal', n: '+ Kundenskonto', p: 'ksko' },
        { id: 'zvp', n: '= Zielverkaufspreis', p: null },
        { id: 'krabVal', n: '+ Kundenrabatt', p: 'krab' },
        { id: 'lvp', n: '= Listenverkaufspreis (netto)', p: null }
    ];

    const zusAbsSchema = [
        { id: 'bgp', n: 'Bezugspreis', p: null },
        { id: 'zusVal', n: '+ Kalkulationszuschlag', p: 'zus' },
        { id: 'lvp', n: '= Listenverkaufspreis (netto)', p: null },
        { id: 'absVal', n: '- Kalkulationsabschlag', p: 'abs' },
        { id: 'bgp2', n: '= Bezugspreis', p: null }
    ];

    function fmt(v) { return v.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function round(v) { return Math.round((v + Number.EPSILON) * 100) / 100; }
    
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function setLevel(l) { 
        currentLevel = l; 
        document.querySelectorAll('.btn-level').forEach((b,i)=>b.classList.toggle('active', i+1===l)); 
        loadNewTask(); 
    }

    function loadNewTask() {
        // Varianz Generator: Zufällige Werte für alle Parameter
        const lep = round(100 + Math.random() * 900);
        const rab = [5, 10, 12.5, 15, 20][Math.floor(Math.random()*5)];
        const sko = [2, 3][Math.floor(Math.random()*2)];
        const bez = round(5 + Math.random() * 45);
        const hk = [15, 20, 25, 30][Math.floor(Math.random()*4)];
        const gew = [5, 10, 12, 15, 20][Math.floor(Math.random()*5)];
        const ksko = [2, 3][Math.floor(Math.random()*2)];
        const krab = [0, 5, 10, 15][Math.floor(Math.random()*4)];
        
        const rv = round(lep * (rab/100)), zep = round(lep - rv), sv = round(zep * (sko/100)), bep = round(zep - sv), bgp = round(bep + bez);
        const hv = round(bgp * (hk/100)), sk = round(bgp + hv), gv = round(sk * (gew/100)), bvp = round(sk + gv);
        const zvp = round(bvp / ((100-ksko)/100)), ksv = round(zvp - bvp);
        const lvp = round(zvp / ((100-krab)/100)), krv = round(lvp - zvp);

        const zus = round(((lvp - bgp) / bgp) * 100);
        const abs = round(((lvp - bgp) / lvp) * 100);

        task = { lep, rab, rabVal: rv, zep, sko, skoVal: sv, bep, bez, bgp, hk, hkVal: hv, sk, gew, gewVal: gv, bvp, ksko, kskoVal: ksv, zvp, krab, krabVal: krv, lvp, zus, zusVal: round(lvp-bgp), abs, absVal: round(lvp-bgp), bgp2: bgp };
        
        const scenarios = {
            bezug: `Ein Unternehmen bestellt Ware zum Listeneinkaufspreis von ${fmt(lep)} €. Der Lieferant gewährt einen Rabatt von ${rab} % und bei sofortiger Zahlung ein Skonto von ${sko} %. Die anfallenden Bezugskosten belaufen sich auf ${fmt(bez)} €.`,
            vorwaerts: `Ein Betrieb kalkuliert ein Produkt mit einem Listeneinkaufspreis von ${fmt(lep)} €. Konditionen: ${rab} % Rabatt, ${sko} % Skonto, ${fmt(bez)} € Fracht. Die Handlungskosten liegen bei ${hk} %, der Gewinn bei ${gew} %. Für den Verkauf sind ${ksko} % Skonto und ${krab} % Kundenrabatt vorgesehen.`,
            rueckwaerts: `Ein Artikel soll im Katalog netto für ${fmt(lvp)} € angeboten werden. Geplant sind ${krab} % Kundenrabatt und ${ksko} % Kundenskonto. Der Gewinnanspruch liegt bei ${gew} % auf die Selbstkosten, die Handlungskosten betragen ${hk} %. Ermitteln Sie den maximalen Einstandspreis (Bezugspreis).`,
            differenz: `Der marktübliche Netto-LVP liegt bei ${fmt(lvp)} €. Ihr Bezugspreis beträgt ${fmt(bgp)} €. Bei einem Handlungskostenzuschlag von ${hk} % ist zu berechnen, wie hoch der verbleibende Gewinn in Euro ist.`,
            'zus-abs': `Ermitteln Sie für ein Produkt den Kalkulationszuschlag (%) sowie den Kalkulationsabschlag (%), wenn der Bezugspreis bei ${fmt(bgp)} € liegt und der angestrebte Netto-Verkaufspreis ${fmt(lvp)} € beträgt.`
        };
        document.getElementById('taskDescription').innerText = scenarios[currentMode];
        render();
    }

    function render() {
        const grid = document.getElementById('calcGrid');
        grid.innerHTML = '<div class="row-header">POSTEN</div><div class="row-header">%</div><div class="row-header">BETRAG (€)</div><div class="row-header">STATUS</div>';
        
        let schema = (currentMode === 'bezug') ? fullSchema.slice(0, 7) : (currentMode === 'zus-abs' ? zusAbsSchema : fullSchema);
        const dropdownOptions = shuffle(schema.map(item => ({ id: item.id, n: item.n.replace(/[=+\-]/g, '').trim() })));

        schema.forEach(row => {
            if (currentLevel < 3) {
                grid.innerHTML += `<div style="font-size:0.85em; font-weight:${row.n.startsWith('=')?800:400}">${row.n}</div>`;
            } else {
                let opts = dropdownOptions.map(o => `<option value="${o.id}">${o.n}</option>`).join('');
                grid.innerHTML += `<select id="name-${row.id}" onchange="validateName('${row.id}')"><option value="">Wählen...</option>${opts}</select>`;
            }

            if (row.p) {
                grid.innerHTML += `<input id="p-${row.id}" class="${currentLevel==1?'given':''}" value="${currentLevel==1?task[row.p]:''}">`;
            } else grid.innerHTML += `<div></div>`;

            let isG = (row.id==='lep' && currentMode!=='rueckwaerts') || (row.id==='lvp' && (currentMode==='rueckwaerts'||currentMode==='differenz'||currentMode==='zus-abs')) || (row.id==='bgp' && (currentMode==='differenz'||currentMode==='zus-abs')) || row.id==='bez';
            grid.innerHTML += `<input id="v-${row.id}" class="${(isG && currentLevel<3)?'given':''}" value="${(isG && currentLevel<3)?fmt(task[row.id]):''}">`;
            grid.innerHTML += `<div id="s-${row.id}" class="status-cell"></div>`;
        });
    }

    function validateName(rowId) {
        if(currentLevel === 3) {
            const sel = document.getElementById('name-' + rowId);
            sel.className = (sel.value === rowId) ? 'correct' : 'wrong';
        }
    }

    function validate() {
        let schema = (currentMode === 'bezug') ? fullSchema.slice(0, 7) : (currentMode === 'zus-abs' ? zusAbsSchema : fullSchema);
        schema.forEach(row => {
            const vEl = document.getElementById('v-' + row.id);
            const sEl = document.getElementById('s-' + row.id);
            if(!vEl) return;
            
            let val = parseFloat(vEl.value.replace('.', '').replace(',', '.'));
            let okValue = Math.abs(val - task[row.id]) < 0.05;
            let okName = true;
            
            if (currentLevel > 1 && row.p) {
                let pInput = document.getElementById('p-' + row.id).value.replace(',','.');
                let pVal = parseFloat(pInput);
                if (Math.abs(pVal - task[row.p]) > 0.1) okValue = false;
            }

            if (currentLevel === 3) {
                const nameSelect = document.getElementById('name-' + row.id);
                if (nameSelect.value !== row.id) { okName = false; nameSelect.className = 'wrong'; }
                else { nameSelect.className = 'correct'; }
            }

            vEl.className = okValue ? 'correct' : 'wrong';
            sEl.innerText = (okValue && okName) ? '✅' : '❌';
        });
    }

    function setMode(m) { currentMode = m; document.querySelectorAll('.tabs .btn').forEach(b=>b.classList.toggle('active', b.id==='m-'+m)); loadNewTask(); }
    function toggleCalc() { let w = document.getElementById('calc-widget'); w.style.display = w.style.display==='block'?'none':'block'; }
    function appendToCalc(v) { let d = document.getElementById('display'); d.value = d.value === "0" ? v : d.value + v; }
    function clearCalc() { document.getElementById('display').value = "0"; }
    function calculateResult() { try { document.getElementById('display').value = eval(document.getElementById('display').value.replace(',', '.')); } catch(e) { alert("Fehler"); } }
    function backspaceCalc() { let d = document.getElementById('display'); d.value = d.value.slice(0,-1) || "0"; }
    function toggleModal(id) { let m = document.getElementById(id); m.style.display = m.style.display==='block'?'none':'block'; }

    loadNewTask();
</script>
</body>
</html>
