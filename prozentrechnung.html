<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training: Prozentrechnung</title>
    <style>
        :root {
            --main: #e17055;
            --main-dark: #d35400;
            --light: #fab1a0;
            --bg: #f5f6fa;
            --border-dark: #2d3436;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            color: var(--border-dark);
        }

        .card {
            background: var(--white);
            border: 2px solid var(--border-dark);
            width: 100%;
            max-width: 950px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 10px 10px 0px var(--border-dark); /* Sketch-Stil Schatten */
        }

        /* Header & Navigation */
        .header-row {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            gap: 20px;
        }

        .back-btn {
            font-size: 0.95rem;
            text-decoration: none;
            color: var(--border-dark);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: var(--light);
        }

        .main-title {
            border: 3px solid var(--main);
            border-radius: 30px;
            padding: 8px 40px;
            font-weight: 800;
            color: var(--main);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: auto;
        }

        /* Themen-Kacheln */
        .grid-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 35px;
        }

        .topic-button {
            border: 2px solid var(--border-dark);
            border-radius: 12px;
            padding: 15px 10px;
            background: var(--white);
            cursor: pointer;
            font-weight: 700;
            color: var(--border-dark);
            font-size: 0.85rem;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .topic-button:hover {
            transform: translateY(-3px);
            border-color: var(--main);
            color: var(--main);
        }

        .topic-button.active {
            background: var(--main);
            color: var(--white);
            border-color: var(--border-dark);
            box-shadow: 4px 4px 0px var(--border-dark);
        }

        /* Aufgaben-Box */
        .task-box {
            border: 2px solid var(--border-dark);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            min-height: 160px;
            background: #fffdfb;
            position: relative;
        }

        .label {
            font-weight: 900;
            font-size: 1.3rem;
            display: block;
            margin-bottom: 15px;
            color: var(--main);
            text-transform: uppercase;
        }

        /* Input Bereich */
        .input-area {
            border: 2px solid var(--border-dark);
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            background: var(--white);
            transition: box-shadow 0.2s;
        }

        .input-area:focus-within {
            box-shadow: 0 0 0 3px var(--light);
        }

        .input-area label {
            font-weight: 800;
            margin-right: 20px;
            font-size: 1.2rem;
        }

        .input-area input {
            border: none;
            border-bottom: 3px solid var(--light);
            width: 100%;
            font-size: 1.4rem;
            padding: 5px;
            outline: none;
            color: var(--main-dark);
            font-weight: 600;
            background: transparent;
        }

        .unit-label {
            margin-left: 15px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--main);
        }

        /* Action Buttons */
        .footer-actions {
            display: flex;
            gap: 20px;
        }

        .btn-action {
            flex: 1;
            border: 2px solid var(--border-dark);
            border-radius: 15px;
            padding: 22px;
            text-align: center;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            user-select: none;
        }

        .btn-feedback { 
            background: var(--main); 
            color: var(--white);
        }

        .btn-feedback:hover {
            background: var(--main-dark);
            transform: scale(1.02);
        }

        .btn-next { 
            background: #dfe6e9; 
            color: var(--border-dark);
        }

        .btn-next:hover {
            background: #b2bec3;
            transform: scale(1.02);
        }

        /* Result Styles */
        .res-text { font-size: 1.1rem; }
        .correct-anim { color: #fff !important; background: #27ae60 !important; border-color: var(--border-dark) !important; }
        .wrong-anim { color: #fff !important; background: #d63031 !important; border-color: var(--border-dark) !important; }

        @media (max-width: 600px) {
            .footer-actions { flex-direction: column; }
            .grid-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-row">
            <a href="index.html" class="back-link">← DASHBOARD</a>
            <div class="main-title">Prozentrechnung</div>
        </div>

        <div class="grid-row" id="topic-nav">
            <div class="topic-button active" onclick="setTopic('W', this)">Prozentwert</div>
            <div class="topic-button" onclick="setTopic('p', this)">Prozentsatz</div>
            <div class="topic-button" onclick="setTopic('G', this)">Grundwert</div>
            <div class="topic-button" onclick="setTopic('Gplus', this)">Vermehrter GW</div>
            <div class="topic-button" onclick="setTopic('Gminus', this)">Verminderter GW</div>
        </div>

        <div class="task-box">
            <span class="label">Aufgabe</span>
            <p id="question-text" style="font-size: 1.25rem; line-height: 1.6; margin: 0; font-weight: 500;">Lade Aufgabe...</p>
        </div>

        <div class="input-area">
            <label>LÖSUNG</label>
            <input type="number" id="user-val" placeholder="0,00" step="0.01">
            <span id="unit" class="unit-label"></span>
        </div>

        <div class="footer-actions">
            <div id="feedback-btn" class="btn-action btn-feedback" onclick="validate()">
                <span id="res-label">Prüfen</span>
            </div>
            <div class="btn-action btn-next" onclick="nextTask()">
                Nächste
            </div>
        </div>
    </div>

    <script>
        const taskPool = {
            'W': [
                { q: "Ein Unternehmen investiert 12.000 € in neue Hardware. Der Hersteller gewährt 15 % Rabatt. Wie hoch ist der Nachlass in Euro?", a: 1800, u: "€" },
                { q: "Von 500 verkauften Tickets wurden 8 % storniert. Wie viele Tickets sind das?", a: 40, u: "Stück" }
            ],
            'p': [
                { q: "Ein Artikel wurde von 250 € auf 212,50 € reduziert. Berechne den Rabattsatz.", a: 15, u: "%" },
                { q: "Ein Makler erhält 1.800 € Provision bei einem Verkaufswert von 60.000 €. Wie viel Prozent sind das?", a: 3, u: "%" }
            ],
            'G': [
                { q: "Ein Skonto-Abzug von 2 % entspricht 24 €. Wie hoch war der ursprüngliche Rechnungsbetrag?", a: 1200, u: "€" },
                { q: "12 Personen einer Firma sind im Homeoffice, das sind 15 % der Belegschaft. Wie viele Mitarbeiter hat die Firma?", a: 80, u: "Pers." }
            ],
            'Gplus': [
                { q: "Ein Nettopreis von 1.200 € soll inklusive 19 % USt berechnet werden. Wie hoch ist der Brutto-Verkaufspreis?", a: 1428, u: "€" },
                { q: "Ein Preis stieg um 10 % auf 110 €. Wie hoch war der Preis vor der Erhöhung?", a: 100, u: "€" }
            ],
            'Gminus': [
                { q: "Ein Mantel kostet nach 20 % Rabatt noch 160 €. Wie hoch war der Preis vor der Reduzierung?", a: 200, u: "€" },
                { q: "Eine Flasche enthält nach 25 % Gratis-Entnahme noch 600 ml. Wie viel war ursprünglich enthalten?", a: 800, u: "ml" }
            ]
        };

        let currentCategory = 'W';
        let currentTask = null;

        function setTopic(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.topic-button').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            nextTask();
        }

        function nextTask() {
            const tasks = taskPool[currentCategory];
            currentTask = tasks[Math.floor(Math.random() * tasks.length)];
            
            // UI Reset
            document.getElementById('question-text').innerText = currentTask.q;
            document.getElementById('unit').innerText = currentTask.u;
            document.getElementById('res-label').innerText = "Prüfen";
            
            const fbBtn = document.getElementById('feedback-btn');
            fbBtn.className = "btn-action btn-feedback";
            
            const input = document.getElementById('user-val');
            input.value = "";
            input.focus();
        }

        function validate() {
            if (!currentTask) return;
            const val = parseFloat(document.getElementById('user-val').value);
            const label = document.getElementById('res-label');
            const fbBtn = document.getElementById('feedback-btn');
            
            if (isNaN(val)) return;

            if (Math.abs(val - currentTask.a) < 0.01) {
                label.innerText = "Korrekt!";
                fbBtn.className = "btn-action btn-feedback correct-anim";
            } else {
                label.innerText = "Lösung: " + currentTask.a;
                fbBtn.className = "btn-action btn-feedback wrong-anim";
            }
        }

        nextTask();
    </script>
</body>
</html>
