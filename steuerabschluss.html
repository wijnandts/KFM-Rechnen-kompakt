<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW-Trainer: Steuerabschluss Profi</title>
    <style>
        :root { --primary: #8e44ad; --bg: #f4f7f6; --success: #27ae60; --error: #e74c3c; --border: #ced4da; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; touch-action: manipulation; }
        .app-container { background: white; max-width: 1100px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; }

        .header-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 2100; }
        .btn-round { background: var(--primary); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.3rem; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; padding-right: 150px; }
        .btn-home { text-decoration: none; color: #555; font-size: 0.9rem; font-weight: bold; background: #e0e0e0; padding: 8px 15px; border-radius: 8px; }
        
        .level-selector { display: flex; gap: 5px; }
        .level-btn { padding: 8px 12px; border: 2px solid var(--primary); background: white; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--primary); font-size: 0.8rem; }
        .level-btn.active { background: var(--primary); color: white; }

        h1 { color: var(--primary); text-align: center; font-size: 1.5rem; margin: 15px 0; text-transform: uppercase; }
        .task-box { background: #f4eef8; border-left: 5px solid var(--primary); padding: 15px; margin-bottom: 25px; border-radius: 4px; font-size: 0.95rem; line-height: 1.5; }

        .konto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 30px; }
        .t-konto-wrapper { background: #fff; border: 1px solid var(--border); border-top: 4px solid #333; border-radius: 8px; overflow: hidden; }
        .konto-title { background: #f8f9fa; padding: 12px; text-align: center; font-weight: bold; border-bottom: 2px solid #333; }

        .t-table { width: 100%; border-collapse: collapse; }
        .t-table th { border-bottom: 1px solid #333; padding: 8px; font-size: 0.85rem; background: #fafafa; }
        .soll-cell { border-right: 2px solid #333; width: 50%; padding: 10px; vertical-align: top; }
        .haben-cell { width: 50%; padding: 10px; vertical-align: top; }

        .entry-row { display: flex; gap: 4px; align-items: center; margin-bottom: 10px; }
        .gk-select { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.75rem; background: #fff; }
        .val-input { width: 105px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: right; font-size: 0.85rem; font-weight: bold; }

        .footer-row { display: flex; border-top: 2px solid #333; background: #f1f1f1; font-weight: bold; }
        .footer-cell { flex: 1; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .footer-cell:first-child { border-right: 2px solid #333; }

        .result-area { margin: 25px 0; padding: 20px; border: 2px dashed var(--primary); border-radius: 12px; display: flex; justify-content: center; gap: 15px; align-items: center; background: #fdfaff; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        .btn-check { background: var(--primary); color: white; }
        .btn-next { background: var(--success); color: white; display: none; }

        #calc-container { display: none; position: fixed; top: 120px; left: 20px; width: 230px; background: #333; border-radius: 12px; padding: 12px; z-index: 3000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); cursor: move; touch-action: none; }
        #calc-display { width: 100%; height: 45px; background: #eee; border-radius: 5px; margin-bottom: 10px; text-align: right; padding: 10px; font-family: monospace; font-size: 1.3rem; border: none; box-sizing: border-box; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .calc-btn { padding: 12px; border: none; border-radius: 6px; background: #555; color: white; font-weight: bold; cursor: pointer; }
        
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 15px; width: 85%; max-width: 600px; position: relative; }
    </style>
</head>
<body>

<div id="calc-container">
    <input type="text" id="calc-display" readonly value="0">
    <div class="calc-grid">
        <button class="calc-btn" style="background:var(--error); grid-column:span 2;" onclick="calcClear()">C</button>
        <button class="calc-btn" onclick="calcOp('/')">÷</button><button class="calc-btn" onclick="calcOp('*')">×</button>
        <button class="calc-btn" onclick="calcNum('7')">7</button><button class="calc-btn" onclick="calcNum('8')">8</button><button class="calc-btn" onclick="calcNum('9')">9</button>
        <button class="calc-btn" onclick="calcOp('-')">-</button>
        <button class="calc-btn" onclick="calcNum('4')">4</button><button class="calc-btn" onclick="calcNum('5')">5</button><button class="calc-btn" onclick="calcNum('6')">6</button>
        <button class="calc-btn" onclick="calcOp('+')">+</button>
        <button class="calc-btn" onclick="calcNum('1')">1</button><button class="calc-btn" onclick="calcNum('2')">2</button><button class="calc-btn" onclick="calcNum('3')">3</button>
        <button class="calc-btn" onclick="calcSolve()" style="background:var(--success); grid-column:span 2;">=</button><button class="calc-btn" onclick="calcNum('0')">0</button><button class="calc-btn" onclick="calcNum('.')">.</button>
    </div>
</div>

<div class="app-container">
    <div class="header-actions">
        <a href="mailto:wijnandts@bk-erkelenz.de" class="btn-round">✉</a>
        <button class="btn-round" onclick="toggleCalc()">🖩</button>
        <button class="btn-round" onclick="toggleHelp(true)">?</button>
    </div>
    
    <div class="nav-header">
        <a href="index.html" class="btn-home">🏠 Übersicht</a>
        <div class="level-selector">
            <button class="level-btn active" onclick="setLevel(1, this)">Stufe 1</button>
            <button class="level-btn" onclick="setLevel(2, this)">Stufe 2</button>
            <button class="level-btn" onclick="setLevel(3, this)">Stufe 3</button>
        </div>
    </div>

    <h1>Steuerabschluss Profi-Training</h1>
    <div id="task" class="task-box">Generiere Fall...</div>

    <div class="konto-grid">
        <div class="t-konto-wrapper">
            <div class="konto-title">Vorsteuer</div>
            <table class="t-table">
                <thead><tr><th>Soll</th><th>Haben</th></tr></thead>
                <tbody>
                    <tr>
                        <td class="soll-cell"><div class="entry-row"><span>Saldo</span><input type="number" step="0.01" class="val-input" id="vst-s-val"></div></td>
                        <td class="haben-cell">
                            <div class="entry-row"><select class="gk-select" id="vst-h1-gk"><option value="">Gegenkonto</option><option>Umsatzsteuer</option><option>SBK</option></select><input type="number" step="0.01" class="val-input" id="vst-h1-val"></div>
                            <div class="entry-row"><select class="gk-select" id="vst-h2-gk"><option value="">Gegenkonto</option><option>Umsatzsteuer</option><option>SBK</option></select><input type="number" step="0.01" class="val-input" id="vst-h2-val"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="footer-row">
                <div class="footer-cell"><span>Summe:</span><input type="number" step="0.01" class="val-input" id="vst-sum-s"></div>
                <div class="footer-cell"><span>Summe:</span><input type="number" step="0.01" class="val-input" id="vst-sum-h"></div>
            </div>
        </div>

        <div class="t-konto-wrapper">
            <div class="konto-title">Umsatzsteuer</div>
            <table class="t-table">
                <thead><tr><th>Soll</th><th>Haben</th></tr></thead>
                <tbody>
                    <tr>
                        <td class="soll-cell">
                            <div class="entry-row"><select class="gk-select" id="ust-s1-gk"><option value="">Gegenkonto</option><option>Vorsteuer</option><option>SBK</option></select><input type="number" step="0.01" class="val-input" id="ust-s1-val"></div>
                            <div class="entry-row"><select class="gk-select" id="ust-s2-gk"><option value="">Gegenkonto</option><option>Vorsteuer</option><option>SBK</option></select><input type="number" step="0.01" class="val-input" id="ust-s2-val"></div>
                        </td>
                        <td class="haben-cell"><div class="entry-row"><span>Saldo</span><input type="number" step="0.01" class="val-input" id="ust-h-val"></div></td>
                    </tr>
                </tbody>
            </table>
            <div class="footer-row">
                <div class="footer-cell"><span>Summe:</span><input type="number" step="0.01" class="val-input" id="ust-sum-s"></div>
                <div class="footer-cell"><span>Summe:</span><input type="number" step="0.01" class="val-input" id="ust-sum-h"></div>
            </div>
        </div>
    </div>

    <div class="result-area">
        <select id="res-type" class="gk-select" style="max-width:220px; padding:10px;">
            <option value="">-- Ergebnis --</option><option value="Zahllast">Zahllast</option><option value="Vorsteuerüberhang">Vorsteuerüberhang</option>
        </select>
        <input type="number" step="0.01" id="res-val" class="val-input" placeholder="€" style="width:120px;">
    </div>

    <div id="fb" style="display:none; padding:15px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:15px;"></div>
    <button class="btn-action btn-check" onclick="validate()">Abschluss prüfen</button>
    <button id="nextBtn" class="btn-action btn-next" onclick="generateTask()">Nächste Aufgabe</button>
</div>

<div id="helpModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--primary)">Anleitung</h2>
        <p>1. Trage die Salden ein.<br>2. Das <b>kleinere</b> Konto wird über das <b>größere</b> umgebucht.<br>3. Der Restbetrag im größeren Konto geht ans <b>SBK</b>.</p>
        <button class="btn-action btn-check" onclick="toggleHelp(false)">Verstanden</button>
    </div>
</div>

<script>
    let task = {}, config = { level: 1 };
    const fmt = n => n.toLocaleString('de-DE', {minimumFractionDigits: 2});

    function setLevel(l, b) { config.level = l; document.querySelectorAll('.level-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); generateTask(); }
    function toggleHelp(s) { document.getElementById('helpModal').style.display = s ? 'block' : 'none'; }
    function toggleCalc() { const c = document.getElementById("calc-container"); c.style.display = (c.style.display === "block") ? "none" : "block"; }

    function generateTask() {
        let v = Math.floor(Math.random() * 3000) + 500;
        let u = Math.floor(Math.random() * 3000) + 500;
        if(config.level === 3) { v += Math.random(); u += Math.random(); }
        if(v === u) u += 100;
        task = { vst: v, ust: u, diff: Math.abs(u - v), isZahllast: u > v };
        
        document.getElementById('task').innerHTML = `<b>Salden zum 31.12.:</b><br>Vorsteuer: ${fmt(v)} € | Umsatzsteuer: ${fmt(u)} €.<br>Schließen Sie die Konten fachgerecht ab.`;
        document.querySelectorAll('input:not([readonly])').forEach(i => i.value = "");
        document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        document.getElementById('fb').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
    }

    function validate() {
        const fb = document.getElementById('fb');
        const getV = id => parseFloat(document.getElementById(id).value) || 0;
        const getS = id => document.getElementById(id).value;
        let err = [];

        if(Math.abs(getV('vst-s-val') - task.vst) > 0.01 || Math.abs(getV('ust-h-val') - task.ust) > 0.01) err.push("Anfangssalden falsch.");

        if(task.isZahllast) {
            if(!((getS('vst-h1-gk')==="Umsatzsteuer" && Math.abs(getV('vst-h1-val')-task.vst)<0.01) || (getS('vst-h2-gk')==="Umsatzsteuer" && Math.abs(getV('vst-h2-val')-task.vst)<0.01))) err.push("Vorsteuer muss über USt umgebucht werden.");
            if(getS('res-type') !== "Zahllast" || Math.abs(getV('res-val') - task.diff) > 0.01) err.push("Zahllast falsch.");
        } else {
            if(!((getS('ust-s1-gk')==="Vorsteuer" && Math.abs(getV('ust-s1-val')-task.ust)<0.01) || (getS('ust-s2-gk')==="Vorsteuer" && Math.abs(getV('ust-s2-val')-task.ust)<0.01))) err.push("Umsatzsteuer muss über VSt umgebucht werden.");
            if(getS('res-type') !== "Vorsteuerüberhang" || Math.abs(getV('res-val') - task.diff) > 0.01) err.push("Überhang falsch.");
        }

        fb.style.display = "block";
        if(err.length === 0) {
            fb.style.background = "#d4edda"; fb.style.color = "#155724"; fb.innerHTML = "✅ Korrekt!";
            document.getElementById('nextBtn').style.display = "block";
        } else {
            fb.style.background = "#f8d7da"; fb.style.color = "#721c24"; fb.innerHTML = "❌ " + err[0];
        }
    }
    
    // Rechner Drag & Logic
    let calcVal = "0";
    function calcNum(n) { calcVal === "0" ? calcVal = n : calcVal += n; document.getElementById("calc-display").value = calcVal; }
    function calcOp(op) { calcVal += op; document.getElementById("calc-display").value = calcVal; }
    function calcClear() { calcVal = "0"; document.getElementById("calc-display").value = "0"; }
    function calcSolve() { try { calcVal = eval(calcVal).toString(); document.getElementById("calc-display").value = calcVal; } catch { calcClear(); } }

    window.onload = generateTask;
</script>
</body>
</html>
